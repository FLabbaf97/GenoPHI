[pytest]
# Pytest configuration for GenoPHI test suite

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers for test categorization
markers =
    smoke: Quick smoke tests for package installation verification (<5 seconds)
    unit: Unit tests for individual functions (seconds)
    integration: Integration tests for module-to-module interactions (~30-45 min)
    e2e: End-to-end tests for complete workflows (~60-90 min)
    slow: Slow-running tests (may take >30 minutes)
    full: Full regression tests with production parameters (~2-3 hours)
    requires_mmseqs2: Tests that require MMSeqs2 to be installed

# Output options
addopts =
    -v
    --tb=short
    --strict-markers
    --color=yes
    -ra

# Timeout for tests (30 minutes default)
timeout = 1800

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Test paths
testpaths = tests

# Warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
